<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Product Details - Agridera</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <style>
        .onion-page-bg {
            background-color: #f1f7fc; 
            padding-bottom: 60px;
            min-height: 70vh;
        }
        .btn-go-cart {
            background-color: #E31E24 !important;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="container header-flex">
                <div class="logo"><a href="index.html"><img src="images/logo.png" alt="Logo"></a></div>
                <nav class="nav">
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="tomatoAll.html">Products</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </header>

        <main class="onion-page-bg">
            <div class="container">
                <div style="padding-top: 30px;">
                    <a href="tomatoAll.html" class="back-link">← Back to all onions</a>
                </div>

                <div class="product-main-flex" v-if="product.id" style="margin-top: 40px;">
                    <div class="product-info-left">
                        <h1 class="product-title-name">{{ product.title }}</h1>
                        <div class="stars-decor"><img src="images/stars.jpg" alt="stars"></div>
                        <h3 style="color: #4A5D23; margin-bottom: 15px;">{{ product.short_text }}</h3>
                        <p style="margin-bottom: 40px; font-size: 16px; color: #666; line-height: 1.6;">
                            {{ product.desc }}
                        </p>
                        <div class="buttons-area">
                            <button v-if="btnVisible == 0" @click="addToCart(product.id)" class="btn-send">
                                Add to cart
                            </button>
                            <a v-if="btnVisible == 1" href="contact.html" class="btn-send btn-go-cart">
                                Go to cart
                            </a>
                        </div>
                    </div>

                    <div class="product-image-right">
                        <div class="main-prod-img">
                            <img :src="'images/' + product.image" :alt="product.title">
                        </div>
                        <div style="margin-top: 25px;">
                            <a href="#" class="btn-download">
                                <img src="images/pdf-icon.png" alt="" style="width: 18px; vertical-align: middle; margin-right: 5px;"> 
                                Download PDF
                            </a>
                        </div>
                    </div>
                </div>

                <div v-else style="padding: 100px 0; text-align: center;">
                    <h2>Loading product info...</h2>
                </div>
            </div>
        </main>

        <footer class="site-footer">
            <div class="footer-bottom">
                <div class="container">AGRIDERA SEEDS & AGRICULTURE LTD. © 2020</div>
            </div>
        </footer>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
